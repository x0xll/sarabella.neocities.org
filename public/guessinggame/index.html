<!DOCTYPE html>
<html>
    <head>
        <title>Guessing Game</title>
        <script src="//cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.js"></script>
        <script src="./js/loadScreen.js"></script>
        <script src="./js/chooseCategory.js"></script>
        <script src="./js/guessing.js"></script>
        <link rel="stylesheet" href="/styles.css">
        <style type="text/css">
            body {
                margin: 0;
            }
        </style>
    </head>
    <body style="text-align: center;">
        <script src="/header.js"></script>
        <div id="gameDiv" style="padding-top: 10px; padding-bottom: 10px; margin: auto; width: 888px;">
            <script type="text/javascript">
                //loadLanguagePref(false);
                //locale = getCurrentLanguageCode()
                locale = "en";
                let localeData;

                function urlExists(url)
                {
                    var http = new XMLHttpRequest();
                    http.open('HEAD', url, false);
                    http.send();
                    return http.status!=404;
                }

                let config = {
                    parent: "gameDiv",
                    dom: {
                        createContainer: true
                    },
                    type: Phaser.WEBGL,
                    width: 888,
                    height: 521,
                    backgroundColor: '#110c27',
                    scene: [
                        Load,
                        ChooseCategory,
                        Guessing
                    ]
                };

                const game = new Phaser.Game(config);
        
            </script>
        </div>

        <div class="footer">
            <a href="/index.html" class="global-lowernav-link">Home</a>
        </div>

    </body>
</html>
