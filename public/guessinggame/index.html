<!DOCTYPE html>
<html>
    <head>
        <title>Guessing Game</title>
        <script src="//cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.js"></script>
        <script src="https://unpkg.com/@esotericsoftware/spine-phaser@4.1.*/dist/iife/spine-phaser.js"></script>
        <script src="./js/loadScreen.js"></script>
        <script src="./js/chooseCategory.js"></script>
        <script src="./js/guessing.js"></script>
        <link rel="stylesheet" href="/styles.css">
        <style type="text/css">
            body {
                margin: 0;
            }
        </style>
    </head>
    <body style="text-align: center;">
        <script src="/header.js"></script>
        <div id="gameDiv" style="padding-top: 10px; padding-bottom: 10px; margin: auto; width: 888px;">
            <script type="text/javascript">
                let config = {
                    parent: "gameDiv",
                    dom: {
                        createContainer: true
                    },
                    type: Phaser.WEBGL,
                    width: 888,
                    height: 521,
                    backgroundColor: '#110c27',
                    plugins: {
                        scene: [
                        { key: "spine.SpinePlugin", plugin: spine.SpinePlugin, mapping: "spine" }
                        ]
                    },
                    scene: [
                        Load,
                        ChooseCategory,
                        Guessing
                    ]
                };

                const game = new Phaser.Game(config);
        
            </script>
        </div>
        <input id="copy" style="display: none">
        <label id="copyLable" for="copy" style="display: none; color: white;">Horse Link</label>
        
        <div class="footer">
            <a href="/index.html" class="global-lowernav-link">Home</a> |
            <a href="./index.html" class="global-lowernav-link">Magical Horses</a> |
            <a href="https://bellasara.wiki.gg/wiki/Magical_Horses" class="global-lowernav-link">Wiki Page</a> |
            <a href="https://github.com/x0xll/sarabella.neocities.org" class="global-lowernav-link">GitHub</a>
          </div>

    </body>
</html>
